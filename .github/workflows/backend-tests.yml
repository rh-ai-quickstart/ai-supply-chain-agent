name: Backend tests

on:
  push:
    branches: [main, master, rj-testing]
    paths:
      - "app/backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "app/backend/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Run pytest (API + ingestion)
        run: python run_backend_tests.py
