global:
  models:
    llama-3-2-1b-instruct:
      id: meta-llama/Llama-3.2-1B-Instruct
      enabled: true

pgvector:
  enabled: true
  secret:
    create: true
    user: postgres
    password: password
    dbname: blueprint
    host: pgvector
    port: "5432"

llama-stack:
  enabled: true
  rawDeploymentMode: true
  pgvector:
    enabled: true
  secrets: {}

llm-service:
  enabled: true
  device: cpu
  secret:
    hf_token: ""
    enabled: true
  models:
    llama-3-2-1b-instruct:
      enabled: true
      device: cpu

imagePullSecrets: []

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/rh-ee-rjjohnso/test
    tag: api
    pullPolicy: Always
  service:
    port: 5001
  route:
    enabled: true
    host: ""
  # Name of the Secret created by the pgvector subchart that holds the
  # database password under the key "password".
  pgvectorSecretName: pgvector
  env:
    LLAMA_STACK_URL: http://llamastack:8321
    LLAMA_STACK_MODEL: meta-llama/Llama-3.2-1B-Instruct
    EMBED_MODEL: all-MiniLM-L6-v2
    # PG_ prefix avoids collision with the Kubernetes service-discovery
    # variable PGVECTOR_PORT=tcp://ip:port that is auto-injected for the
    # pgvector Service, which would corrupt SQLAlchemy URL parsing.
    PG_HOST: pgvector
    PG_PORT: "5432"
    PG_USER: postgres
    PG_DB: blueprint

ingest:
  # Set to true to run the knowledge-base ingestion Job on every
  # helm install / upgrade.
  enabled: true
  image:
    repository: quay.io/rh-ee-rjjohnso/test
    tag: ingestion
    pullPolicy: Always
  # "langchain" — client-side chunking/embedding via LangChain + PGVector.
  # "llamastack" — server-side: uploads files to LlamaStack, which handles
  #                chunking, embedding, and storage internally.
  strategy: "langchain"
  # Path inside the container where .txt files live (baked into the image).
  knowledgeBaseDir: "knowledge_base"
  # File glob relative to knowledgeBaseDir.
  glob: "**/*.txt"
  # --- langchain strategy only ---
  # Drop the existing collection before inserting (clean re-ingest).
  dropOld: "true"
  # Chunking parameters forwarded to RecursiveCharacterTextSplitter.
  chunkSize: "1000"
  chunkOverlap: "200"

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/rh-ee-rjjohnso/test
    tag: frontend
    pullPolicy: Always
  service:
    port: 8080
  route:
    enabled: true
    host: ""
  # BACKEND_URL is auto-set in the deployment template to
  # http://<release>-backend:<backend.service.port>

