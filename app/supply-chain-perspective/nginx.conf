# nginx.conf — OpenShift 4.21 console plugin, HTTPS on port 9001
#
# TLS certificates are NOT baked into the image. They are injected
# at runtime by OpenShift's service-ca controller and mounted into
# the pod at /var/serving-cert/ (read-only).
#
# Constraints satisfied:
#   - No 'user' directive (nginx must not setuid when already non-root).
#   - pid file in /tmp (writable by any UID).
#   - All cache/temp paths under dirs chowned g=u in the Dockerfile.
#   - Listens on 9001 (unprivileged; no NET_BIND_SERVICE needed).
#   - TLSv1.2 minimum; TLSv1.3 preferred. SSLv3/TLSv1.0/1.1 disabled.
#   - HSTS, X-Frame-Options, and other security headers included.

worker_processes auto;

pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect temp/cache paths to locations writable by arbitrary UIDs.
    client_body_temp_path  /tmp/client_body;
    fastcgi_temp_path      /tmp/fastcgi_temp;
    proxy_temp_path        /tmp/proxy_temp;
    scgi_temp_path         /tmp/scgi_temp;
    uwsgi_temp_path        /tmp/uwsgi_temp;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    # stdout/stderr for Kubernetes/OpenShift log collection (was /var/log/nginx/*.log).
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    sendfile        on;
    keepalive_timeout 65;

    # Hide the nginx version from response headers.
    server_tokens off;

    # Enable gzip for common asset types.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    server {
        listen 9001 ssl;
        server_name _;

        # ── TLS configuration ────────────────────────────────
        # Certificates are mounted at runtime from the OCP service-ca secret.
        # The pod spec must mount the secret at /var/serving-cert (readOnly).
        ssl_certificate     /var/serving-cert/tls.crt;
        ssl_certificate_key /var/serving-cert/tls.key;

        # Disable deprecated protocol versions.
        ssl_protocols TLSv1.2 TLSv1.3;

        # Prefer server cipher order; strong ciphers only.
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:'
                    'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:'
                    'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

        # TLS session cache — improves performance on reconnects.
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # OCSP stapling off: OpenShift service-serving certs typically have no OCSP URL.
        ssl_stapling        off;
        ssl_stapling_verify off;

        # ── Site root ─────────────────────────────────────────
        root  /usr/share/nginx/html;
        index index.html;

        # Same-origin API proxy: browser calls /api/... on this plugin; nginx forwards to the
        # in-cluster backend (HTTP). Keep target in sync with charts/openshift-console-plugin values.
        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://supply-chain-dashboard-backend.supply-chain-dashboard.svc.cluster.local:5001;
        }

        # SPA fallback — send all unmatched paths to index.html.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache-bust fingerprinted static assets aggressively.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Security headers ──────────────────────────────────
        # HSTS: tell browsers to always use HTTPS for this origin.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options            "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options     "nosniff"                            always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
        add_header X-XSS-Protection           "1; mode=block"                     always;
    }
}